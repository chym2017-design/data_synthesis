server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 101.245.66.42;

    client_max_body_size 50m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    auth_basic "Synth Engine";
    auth_basic_user_file /etc/nginx/.htpasswd-aiserver;

    location = / {
        return 302 /synth/;
    }

    location = /synth {
        return 301 /synth/;
    }

    location ^~ /synth/ {
        rewrite ^/synth(?:/.*)?$ / break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /assets/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 302 /synth/;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name aiserver.fun www.aiserver.fun;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aiserver.fun www.aiserver.fun;

    ssl_certificate /etc/letsencrypt/live/aiserver.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiserver.fun/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 50m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    auth_basic "Synth Engine";
    auth_basic_user_file /etc/nginx/.htpasswd-aiserver;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
